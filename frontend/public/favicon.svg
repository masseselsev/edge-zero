<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    @keyframes shieldPulse {
      0%, 100% {
        transform: scale(0.92);
      }
      50% {
        transform: scale(1.05);
      }
    }
    .pulse-layer {
      transform-origin: 16px 16px;
      animation: shieldPulse 2.2s infinite ease-in-out;
    }
  </style>
  
  <!-- Solid background matching body-bg (#0b0f19) -->
  <rect width="32" height="32" rx="9" fill="#0b0f19"/>
  
  <!-- Outer container card matching the header logo border -->
  <rect x="2" y="2" width="28" height="28" rx="8" fill="#4f46e5" fill-opacity="0.1" stroke="#6366f1" stroke-width="1.8" stroke-opacity="0.45"/>
  
  <!-- Centered pulsing group -->
  <g class="pulse-layer">
    <!-- Translated group centering 24x24 icon inside 32x32 viewbox -->
    <g transform="translate(4, 4)">
      <!-- Exact Lucide Shield Checkmark path with bright indigo stroke -->
      <path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" fill="none" stroke="#a5b4fc" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
