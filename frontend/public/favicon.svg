<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    @keyframes eyePulse {
      0%, 100% {
        opacity: 0.65;
        transform: scale(0.88);
      }
      50% {
        opacity: 1;
        transform: scale(1.04);
      }
    }
    .pulse-layer {
      transform-origin: 16px 16px;
      animation: eyePulse 2.2s infinite ease-in-out;
    }
  </style>
  
  <!-- Solid background matching body-bg (#0b0f19) to ensure contrast in browser tabs -->
  <rect width="32" height="32" rx="9" fill="#0b0f19"/>
  
  <!-- Outer container matching the header logo rounded-xl card border -->
  <rect x="2" y="2" width="28" height="28" rx="8" fill="#4f46e5" fill-opacity="0.1" stroke="#6366f1" stroke-width="1.8" stroke-opacity="0.3"/>
  
  <!-- Exact Lucide Eye shape from the header logo, scaled to 24px and centered -->
  <g class="pulse-layer" transform="translate(4, 4)">
    <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0z" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="12" cy="12" r="3" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
