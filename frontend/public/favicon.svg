<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    @keyframes eyePulse {
      0%, 100% {
        transform: scale(0.92);
      }
      50% {
        transform: scale(1.05);
      }
    }
    .pulse-layer {
      transform-origin: 16px 16px;
      animation: eyePulse 2.2s infinite ease-in-out;
    }
  </style>
  
  <!-- Solid background matching body-bg (#0b0f19) -->
  <rect width="32" height="32" rx="9" fill="#0b0f19"/>
  
  <!-- Outer container card matching the header logo border -->
  <rect x="2" y="2" width="28" height="28" rx="8" fill="#4f46e5" fill-opacity="0.1" stroke="#6366f1" stroke-width="1.8" stroke-opacity="0.45"/>
  
  <!-- Centered pulsing group -->
  <g class="pulse-layer">
    <!-- Translated group centering 24x24 icon inside 32x32 viewbox -->
    <g transform="translate(4, 4)">
      <!-- Symmetrical Lucide Eye icon with bright indigo stroke -->
      <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" fill="none" stroke="#a5b4fc" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="12" cy="12" r="3" fill="none" stroke="#a5b4fc" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
