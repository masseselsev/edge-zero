<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    @keyframes eyePulse {
      0%, 100% {
        opacity: 0.7;
        transform: scale(0.9);
      }
      50% {
        opacity: 1;
        transform: scale(1.06);
      }
    }
    .pulse-layer {
      transform-origin: center;
      animation: eyePulse 2.2s infinite ease-in-out;
    }
  </style>
  
  <!-- Solid vibrant Indigo container for high visibility -->
  <rect width="32" height="32" rx="7" fill="#4f46e5"/>
  
  <!-- Eye Graphic -->
  <g class="pulse-layer">
    <!-- High contrast white outer eye outline -->
    <path d="M5 16C9 10 12.5 8 16 8C19.5 8 23 10 27 16C23 22 19.5 24 16 24C12.5 24 9 22 5 16Z" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Bright Cyan pupil -->
    <circle cx="16" cy="16" r="3.5" fill="#00f2fe"/>
  </g>
</svg>
