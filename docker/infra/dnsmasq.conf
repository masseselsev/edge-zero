# Disable DNS
port=0

# Interface - listen on your physical interface
interface=enp88s0

# Proxy DHCP mode
dhcp-range=192.168.188.0,proxy

# Architecture detection
dhcp-match=set:bios,option:client-arch,0
dhcp-match=set:efi-x64,option:client-arch,7
dhcp-match=set:efi-x64,option:client-arch,9

# Boot files based on arch
dhcp-boot=tag:bios,pxelinux.0
dhcp-boot=tag:efi-x64,grubx64.efi

# TFTP Server
enable-tftp
tftp-root=/mnt/infra_config/tftp

# Logging for debug
log-dhcp
log-queries
