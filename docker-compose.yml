services:
  overwatch-db:
    image: postgres:16-alpine
    container_name: overwatch-db
    environment:
      POSTGRES_USER: overwatch
      POSTGRES_PASSWORD: overwatch_password
      POSTGRES_DB: overwatch
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - overwatch-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U overwatch"]
      interval: 5s
      timeout: 5s
      retries: 5

  overwatch-core:
    build:
      context: .
      dockerfile: docker/core.Dockerfile
    container_name: overwatch-core
    depends_on:
      overwatch-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://overwatch:overwatch_password@overwatch-db:5432/overwatch
      API_HOST: 0.0.0.0
      API_PORT: 8000
    volumes:
      - ./backend:/app
      - infra_config:/mnt/infra_config
    networks:
      - overwatch-net
    ports:
      - "8000:8000"
    command: ["/app/entrypoint.sh"]

  overwatch-infra:
    build:
      context: .
      dockerfile: docker/infra/Dockerfile
    container_name: overwatch-infra
    cap_add:
      - NET_ADMIN
    network_mode: host # Required for DHCP to relay correctly in some setups, but requirement said "sharing a network".
                       # If we use bridge, dnsmasq needs to be aware.
                       # "The system consists of 4 services sharing a network."
                       # Standard Docker DHCP usually requires host networking OR a DHCP relay.
                       # Given "Industrial Bare-Metal Provisioning", host networking is safest for PXE.
                       # However, the user prompt says "4 services sharing a network" implying a docker network.
                       # But `overwatch-infra` needs to answer external DHCP requests.
                       # I'll stick to a bridge network for internal comms, but exposing ports might not be enough for DHCP (broadcasts).
                       # Wait, "infra service must have CAP_ADD: NET_ADMIN". This implies we might try to run it isolated?
                       # Let's use host networking for infra to be safe for DHCP/PXE, OR bind ports 67/69udp.
                       # Configuring DHCP in docker is tricky. I'll start with binding 67/69/80/443.
    ports:
      - "67:67/udp"
      - "69:69/udp"
      - "80:80"
    volumes:
      - infra_config:/mnt/infra_config
    depends_on:
      - overwatch-core

  overwatch-web:
    image: node:20-alpine # Placeholder for dev, or build stage
    container_name: overwatch-web
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    networks:
      - overwatch-net

volumes:
  postgres_data:
  infra_config:

networks:
  overwatch-net:
    driver: bridge
